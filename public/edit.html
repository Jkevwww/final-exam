<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Student | Student Management System</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <nav aria-label="Main navigation">
      <a href="/index.html">Home</a>
      <a href="/register.html">Register</a>
      <a href="/students.html">Students</a>
      <a href="/edit.html" aria-current="page">Edit Student</a>
    </nav>

    <main class="card">
      <h1>Edit Student</h1>
      <p class="subtitle">Update student information</p>

      <form id="form" novalidate>
        <fieldset class="grid">
          <legend class="visually-hidden">Student Information</legend>

          <div class="form-group">
            <label for="studentId">Student ID <span class="required">*</span></label>
            <input
              id="studentId"
              name="studentId"
              type="text"
              placeholder="e.g. 2024-001"
              maxlength="50"
              autocomplete="off"
              required
              aria-required="true"
              aria-describedby="studentId-hint"
              readonly
            />
            <small id="studentId-hint" class="hint">Student ID cannot be changed</small>
          </div>

          <div class="form-group">
            <label for="fullName">Full Name <span class="required">*</span></label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              placeholder="e.g. Juan Dela Cruz"
              maxlength="120"
              autocomplete="name"
              required
              aria-required="true"
            />
          </div>

          <div class="form-group">
            <label for="course">Course <span class="required">*</span></label>
            <input
              id="course"
              name="course"
              type="text"
              placeholder="e.g. BS Information Technology"
              maxlength="120"
              autocomplete="off"
              required
              aria-required="true"
            />
          </div>

          <div class="form-group">
            <label for="yearLevel">Year Level <span class="required">*</span></label>
            <input
              id="yearLevel"
              name="yearLevel"
              type="text"
              placeholder="e.g. 3rd Year"
              maxlength="50"
              autocomplete="off"
              required
              aria-required="true"
            />
          </div>

          <div class="form-group">
            <label for="emailAddress">Email Address <span class="required">*</span></label>
            <input
              id="emailAddress"
              name="emailAddress"
              type="email"
              inputmode="email"
              placeholder="e.g. juan@email.com"
              maxlength="200"
              autocomplete="email"
              required
              aria-required="true"
            />
          </div>

          <div class="form-group form-actions">
            <button type="submit" id="submitBtn">Update Student</button>
          </div>
        </fieldset>
      </form>

      <div
        id="notice"
        role="alert"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <div class="form-footer">
        <a href="/students.html" class="secondary-link">
          <button type="button" class="secondary">Back to List</button>
        </a>
        <button type="button" class="danger" id="deleteBtn">Delete Student</button>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    // Field validation configuration
    const FIELD_CONFIG = {
      studentId: { label: 'Student ID', maxLength: 50 },
      fullName: { label: 'Full Name', maxLength: 120 },
      course: { label: 'Course', maxLength: 120 },
      yearLevel: { label: 'Year Level', maxLength: 50 },
      emailAddress: { label: 'Email Address', maxLength: 200 }
    };

    // DOM elements
    const form = document.getElementById('form');
    const notice = document.getElementById('notice');
    const submitBtn = document.getElementById('submitBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const studentIdEl = document.getElementById('studentId');

    /**
     * Gets a query parameter from the URL
     * @param {string} key - Parameter name
     * @returns {string|null} Parameter value
     */
    function getQueryParam(key) {
      return new URLSearchParams(location.search).get(key);
    }

    /**
     * Validates all form fields based on FIELD_CONFIG
     * @param {Object} data - Form data object
     * @returns {string|null} Error message if validation fails, null otherwise
     */
    function validateForm(data) {
      for (const [key, config] of Object.entries(FIELD_CONFIG)) {
        const value = String(data[key] || '').trim();

        // Check required
        if (!value) {
          return `${config.label} is required.`;
        }

        // Check max length
        if (value.length > config.maxLength) {
          return `${config.label} must be ${config.maxLength} characters or less.`;
        }
      }

      // Email-specific validation
      const email = data.emailAddress.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        return 'Please enter a valid email address (e.g., user@domain.com).';
      }

      return null;
    }

    /**
     * Sets button loading state
     * @param {boolean} loading - Whether the form is in a loading state
     */
    function setLoadingState(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? 'Updating...' : 'Update Student';
      submitBtn.setAttribute('aria-busy', loading.toString());
    }

    /**
     * Sets delete button loading state
     * @param {boolean} loading - Whether the button is in a loading state
     */
    function setDeleteLoadingState(loading) {
      deleteBtn.disabled = loading;
      deleteBtn.textContent = loading ? 'Deleting...' : 'Delete Student';
      deleteBtn.setAttribute('aria-busy', loading.toString());
    }

    /**
     * Loads student data from the API and populates the form
     */
    async function loadStudentData() {
      const id = getQueryParam('studentId');
      if (!id) return;

      studentIdEl.value = id;

      try {
        const students = await loadStudents();
        const student = students.find(s => String(s.studentId) === String(id));
        if (!student) {
          setNotice(notice, 'error', 'Student not found.');
          return;
        }

        // Populate form fields
        document.getElementById('fullName').value = student.fullName;
        document.getElementById('course').value = student.course;
        document.getElementById('yearLevel').value = student.yearLevel;
        document.getElementById('emailAddress').value = student.emailAddress;
      } catch (err) {
        setNotice(notice, 'error', err.message || 'Failed to load student data.');
      }
    }

    // Form submission handler
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      notice.textContent = '';

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      // Validate form
      const validationError = validateForm(data);
      if (validationError) {
        setNotice(notice, 'error', validationError);
        return;
      }

      // Prepare sanitized payload (exclude studentId as it's in the URL)
      const payload = {};
      const updateFields = ['fullName', 'course', 'yearLevel', 'emailAddress'];
      for (const key of updateFields) {
        payload[key] = String(data[key]).trim();
      }

      const studentId = String(studentIdEl.value || '').trim();
      if (!studentId) {
        setNotice(notice, 'error', 'Student ID is required.');
        return;
      }

      setLoadingState(true);

      try {
        await api(`/api/students/${encodeURIComponent(studentId)}`, {
          method: 'PUT',
          body: JSON.stringify(payload)
        });
        setNotice(notice, 'success', 'Student updated successfully.');
      } catch (err) {
        setNotice(notice, 'error', err.message || 'Failed to update student. Please try again.');
      } finally {
        setLoadingState(false);
      }
    });

    // Delete button handler
    deleteBtn.addEventListener('click', async () => {
      const studentId = studentIdEl.value;
      if (!studentId) {
        setNotice(notice, 'error', 'Student ID is required to delete.');
        return;
      }

      if (!confirm(`Are you sure you want to delete student "${studentId}"? This action cannot be undone.`)) {
        return;
      }

      setDeleteLoadingState(true);

      try {
        await api(`/api/students/${encodeURIComponent(studentId)}`, { method: 'DELETE' });
        setNotice(notice, 'success', 'Student deleted successfully.');
        setTimeout(() => {
          location.href = '/students.html';
        }, 800);
      } catch (err) {
        setNotice(notice, 'error', err.message || 'Failed to delete student. Please try again.');
      } finally {
        setDeleteLoadingState(false);
      }
    });

    // Load student data on page load
    loadStudentData();
  </script>
</body>
</html>
