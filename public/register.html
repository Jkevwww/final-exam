<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register Student</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/register.html">Register</a>
      <a href="/students.html">Students</a>
      <a href="/edit.html">Edit Student</a>
    </nav>

    <div class="card">
      <h1>Student Registration</h1>
      <h2>Create a new student record</h2>

      <form id="form">
        <div class="grid">
          <div>
            <label>Student ID</label>
            <input name="studentId" placeholder="e.g. 2024-001" required />
          </div>
          <div>
            <label>Full Name</label>
            <input name="fullName" placeholder="e.g. Juan Dela Cruz" required />
          </div>
          <div>
            <label>Course</label>
            <input name="course" placeholder="e.g. IT" required />
          </div>
          <div>
            <label>Year Level</label>
            <input name="yearLevel" placeholder="e.g. 3rd Year" required />
          </div>
          <div>
            <label>Email Address</label>
            <input name="emailAddress" type="email" placeholder="e.g. juan@email.com" required />
          </div>
          <div class="form-actions">
            <button type="submit">Add Student</button>
          </div>
        </div>
      </form>

      <div id="notice"></div>

      <div class="form-footer">
        <a href="/students.html">
          <button class="secondary">Go to Student List</button>
        </a>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    const form = document.getElementById('form');
    const notice = document.getElementById('notice');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      notice.textContent = '';
      try {
        const data = Object.fromEntries(new FormData(form).entries());

        // Client-side validation (mirrors backend constraints)
        const required = ['studentId', 'fullName', 'course', 'yearLevel', 'emailAddress'];
        for (const k of required) {
          if (!String(data[k] || '').trim()) {
            return setNotice(notice, 'error', `${k} is required.`);
          }
        }

        const email = String(data.emailAddress || '').trim();
        const emailRegex = /^\S+@\S+\.\S+$/;
        if (!emailRegex.test(email)) {
          return setNotice(notice, 'error', 'Invalid email address.');
        }

        if (String(data.studentId).trim().length > 50) return setNotice(notice, 'error', 'Student ID must be 50 characters or less.');
        if (String(data.fullName).trim().length > 120) return setNotice(notice, 'error', 'Full Name must be 120 characters or less.');
        if (String(data.course).trim().length > 120) return setNotice(notice, 'error', 'Course must be 120 characters or less.');
        if (String(data.yearLevel).trim().length > 50) return setNotice(notice, 'error', 'Year Level must be 50 characters or less.');
        if (String(data.emailAddress).trim().length > 200) return setNotice(notice, 'error', 'Email Address must be 200 characters or less.');

        await api('/api/students', {
          method: 'POST',
          body: JSON.stringify({
            studentId: String(data.studentId).trim(),
            fullName: String(data.fullName).trim(),
            course: String(data.course).trim(),
            yearLevel: String(data.yearLevel).trim(),
            emailAddress: String(data.emailAddress).trim()
          })
        });
        setNotice(notice, 'success', 'Student added successfully.');
        form.reset();
      } catch (err) {
        setNotice(notice, 'error', err.message || 'Failed to add student.');
      }

    });
  </script>
</body>
</html>
